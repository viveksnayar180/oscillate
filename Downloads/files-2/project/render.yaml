services:
  - type: web
    name: oscillate
    runtime: node
    region: singapore   # closest to India
    plan: free

    buildCommand: npm install && npm run build
    startCommand: node server.js

    envVars:
      - key: NODE_ENV
        value: production

      # ── Razorpay ──────────────────────────────────────────────────────────
      # Set these in the Render dashboard → Environment
      - key: RAZORPAY_KEY_ID
        sync: false   # set manually in dashboard
      - key: RAZORPAY_KEY_SECRET
        sync: false   # set manually in dashboard

      # ── Google Pay / UPI (baked into frontend build) ───────────────────
      - key: VITE_UPI_ID
        sync: false
      - key: VITE_UPI_NAME
        value: OSCILLATE
      - key: VITE_RAZORPAY_KEY_ID
        sync: false

    healthCheckPath: /

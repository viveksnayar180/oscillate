services:
  - type: web
    name: oscillate
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      # ── Google Pay / UPI (baked into frontend build) ───────────────────
      - key: VITE_UPI_ID
        sync: false
      - key: VITE_UPI_NAME
        value: OSCILLATE
      # NOTE: Razorpay API routes require a server — use Vercel for payments
      # Set VITE_RAZORPAY_KEY_ID here for the frontend Razorpay script
      - key: VITE_RAZORPAY_KEY_ID
        sync: false
